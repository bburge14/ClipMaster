  <!-- Key shaft -->
  <line x1="10" y1="11" x2="10" y2="21"/>
  <!-- Key teeth -->
  <line x1="10" y1="17" x2="13" y2="17"/>
  <line x1="10" y1="20" x2="14" y2="20"/>
</svg>
