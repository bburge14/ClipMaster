name: clipmaster_app
description: ClipMaster Pro - Viral Content Creation Desktop App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  google_fonts: ^6.1.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # IPC & Networking
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  json_annotation: ^4.8.1

  # Security - API Key Storage
  flutter_secure_storage: ^9.0.0

  # File & Path Management
  path_provider: ^2.1.1
  path: ^1.8.3
  file_picker: ^6.1.1

  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/
